<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آرشیو فیلم و سریال | کافی‌نت طلوع سبزوار</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    background: #f4f5f7;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem 1.25rem 9rem;
  }

  .page {
    width: 100%;
    max-width: 520px;
  }

  .brand-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 1.75rem;
  }

  .brand-logo {
    width: 36px; height: 36px;
    background: #EDE9FE;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .brand-name {
    font-size: 13px;
    font-weight: 500;
    color: #6D28D9;
  }

  .card {
    background: #fff;
    border: 0.5px solid #e5e7eb;
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 10px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 1rem;
    text-align: center;
  }

  .messenger-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .m-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 10px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    transition: opacity 0.15s;
  }

  .m-btn:hover { opacity: 0.88; }

  .btn-ble   { background: #0EA062; }
  .btn-eitaa { background: #E07B1A; }

  .m-btn img {
    width: 24px; height: 24px;
    border-radius: 50%;
    object-fit: contain;
    flex-shrink: 0;
  }

  .alert-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #FFF7ED;
    border: 0.5px solid #FCD34D;
    border-right: 3px solid #F59E0B;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 13px;
    font-weight: 500;
    color: #92400E;
  }

  .alert-box i { font-size: 17px; color: #D97706; flex-shrink: 0; }

  .gallery-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    color: #ccc;
    text-align: right;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .gallery {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .gallery-item {
    display: block;
    border-radius: 14px;
    overflow: hidden;
    border: 0.5px solid #e5e7eb;
    transition: border-color 0.15s;
    background: #f9fafb;
  }

  .gallery-item:hover { border-color: #c4b5fd; }

  .gallery-item img {
    width: 100%;
    height: auto;
    display: block;
  }

  .footer-section {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .footer-hint {
    font-size: 11px;
    color: #ccc;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: #6D28D9;
    font-size: 13px;
    font-weight: 600;
    transition: color 0.15s;
  }

  .home-link:hover { color: #4C1D95; }

  .home-icon {
    width: 34px; height: 34px;
    background: #EDE9FE;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    transition: background 0.15s;
  }

  .home-link:hover .home-icon { background: #DDD6FE; }

  @media (max-width: 420px) {
    .messenger-btns { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="brand-bar">
    <div class="brand-logo">🎬</div>
    <span class="brand-name">آرشیو فیلم و سریال — کافی‌نت طلوع</span>
  </div>

  <div class="card" style="margin-bottom: 10px;">
    <p class="section-title">کانال‌های ما در پیام‌رسان‌های داخلی</p>
    <div class="messenger-btns">
      <a rel="nofollow" href="https://ble.ir/CafeFilm55" class="m-btn btn-ble" target="_blank">

  <div class="alert-box" style="margin-bottom: 10px;">

  <div class="card">

    <div class="gallery">

      </a>

        <img alt="فیلم ایرانی" src="https://i.imgur.com/7BYVG3f.png" loading="lazy">
      </a>
      <a rel="nofollow" class="gallery-item" href="https://t.me/s/animationsnet" target="_blank">
        <img alt="انیمیشن" src="https://i.imgur.com/GuzrYs0.png" loading="lazy">
      </a>
      <a rel="nofollow" class="gallery-item" href="https://t.me/s/foreignseriesnet" target="_blank">
        <img alt="سریال خارجی" src="https://i.imgur.com/FQdGPwq.png" loading="lazy">
      </a>
      <a rel="nofollow" class="gallery-item" href="https://t.me/s/ForeignMovieNet" target="_blank">
        <img alt="فیلم خارجی" src="https://i.imgur.com/bFsS14h.png" loading="lazy">
      </a>
      <a rel="nofollow" class="gallery-item" href="https://t.me/s/turkishseriesnet" target="_blank">
        <img alt="سریال ترکی" src="https://i.imgur.com/CAmXl7z.png" loading="lazy">
      </a>
      <a rel="nofollow" class="gallery-item" href="https://t.me/s/koreanseriesnet" target="_blank">
        <img alt="سریال کره‌ای" src="https://i.imgur.com/RuHzX5m.png" loading="lazy">
      </a>
      <a rel="nofollow" class="gallery-item" href="https://t.me/s/CafeFilm55" target="_blank">
        <img alt="کافه فیلم" src="https://i.imgur.com/h22ufX4.png" loading="lazy">
      </a>
      <a rel="nofollow" class="gallery-item" href="https://t.me/addlist/dbQ-uQML4hQwZWE0" target="_blank">
        <img alt="شبکات طلوع" src="https://i.imgur.com/ZlmUP2V.png" loading="lazy">
      </a>
    </div>
  </div>

  <div class="footer-section">
    <span class="footer-hint">بازگشت</span>
    <a href="/" class="home-link">
      <div class="home-icon">🏠</div>
      صفحه اصلی
    </a>
  </div>

</div>
</body>
</html>
