<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>آدرس | کافی‌نت طلوع سبزوار</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap');
  :root{
    --bg:#f6f8f9; --surface:#ffffff;
    --ink:#111827; --muted:#6b7280;
    --acc:#059669; --acc2:#047857; --acc3:#10b981;
    --border:rgba(5,150,105,.14); --border2:rgba(5,150,105,.28);
    --line:#e5e9eb;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Vazirmatn',Tahoma,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    padding-bottom:70px;
  }
  .bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .bg-mesh{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 70% 55% at 12% 8%, rgba(5,150,105,.06), transparent 60%),
      radial-gradient(ellipse 60% 45% at 92% 85%, rgba(5,150,105,.05), transparent 60%),
      linear-gradient(160deg,#ffffff 0%,#f6f8f9 55%,#f1f4f5 100%);
  }
  .wrap{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:0 20px 40px;}

  .hero{text-align:center;padding:72px 20px 52px;}
  .hero-badge{
    display:inline-flex;align-items:center;gap:8px;
    font-size:.78rem;font-weight:600;letter-spacing:1.5px;color:var(--acc2);
    background:rgba(5,150,105,.08);border:1px solid var(--border2);
    border-radius:100px;padding:6px 18px;margin-bottom:26px;
  }
  .hero-badge::before{content:'';width:6px;height:6px;background:var(--acc);border-radius:50%;}
  .hero h1{
    font-size:clamp(2rem,6.5vw,3.2rem);font-weight:800;line-height:1.25;
    color:var(--ink);letter-spacing:-.5px;margin-bottom:14px;
  }
  .hero h1 span{
    background:linear-gradient(135deg,var(--acc2),var(--acc));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .hero-sub{font-size:1rem;color:var(--muted);font-weight:400;}

  .divider{display:flex;align-items:center;gap:16px;margin:44px 0 24px;}
  .divider-line{flex:1;height:1px;background:var(--line);}
  .divider-label{
    font-size:.8rem;font-weight:700;letter-spacing:.5px;color:var(--acc2);white-space:nowrap;
    background:rgba(5,150,105,.06);border:1px solid var(--border);
    border-radius:100px;padding:5px 16px;
  }

  .addr-card{
    position:relative;overflow:hidden;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:22px;padding:30px 32px;
    box-shadow:0 16px 40px -20px rgba(17,24,39,.15);
  }
  .addr-pin-row{display:flex;align-items:center;gap:16px;}
  .pin-icon-wrap{
    flex-shrink:0;width:52px;height:52px;border-radius:15px;
    background:linear-gradient(135deg,var(--acc),var(--acc2));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 24px -8px rgba(5,150,105,.45);
  }
  .pin-icon-wrap svg{width:26px;height:26px;fill:white;}
  .addr-text{flex:1;}
  .addr-label{font-size:.75rem;font-weight:600;letter-spacing:1.5px;color:var(--acc2);margin-bottom:6px;}
  .addr-value{font-size:clamp(1rem,3.5vw,1.3rem);font-weight:700;color:var(--ink);line-height:1.7;}

  .map-btn{
    display:flex;align-items:center;gap:16px;
    text-decoration:none;color:var(--ink);font-weight:600;font-size:1rem;
    padding:19px 26px;border-radius:20px;
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:0 12px 30px -18px rgba(17,24,39,.18);
    transition:all .25s ease;
  }
  .map-btn:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:0 20px 40px -18px rgba(5,150,105,.25);}
  .map-icon{
    width:50px;height:50px;flex-shrink:0;border-radius:15px;
    background:linear-gradient(135deg,#4285f4,#1a4fba);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px -6px rgba(66,133,244,.4);
  }
  .map-icon svg{width:26px;height:26px;fill:white;}
  .btn-text{flex:1;text-align:right;}
  .btn-title{font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:2px;}
  .btn-hint{font-size:.75rem;color:var(--muted);}
  .btn-arrow{
    width:36px;height:36px;border-radius:50%;
    background:rgba(5,150,105,.08);border:1px solid var(--border2);
    display:flex;align-items:center;justify-content:center;
    transition:all .25s;
  }
  .map-btn:hover .btn-arrow{background:var(--acc);border-color:var(--acc);}
  .btn-arrow svg{width:18px;height:18px;stroke:var(--acc2);transition:stroke .25s;}
  .map-btn:hover .btn-arrow svg{stroke:#fff;}

  .img-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:500px){.img-grid{grid-template-columns:1fr;}}
  .img-card{
    border-radius:18px;overflow:hidden;
    border:1px solid var(--line);
    box-shadow:0 14px 34px -20px rgba(17,24,39,.2);
    background:var(--surface);position:relative;
  }
  .img-card img{width:100%;display:block;transition:transform .5s ease;}
  .img-card:hover img{transform:scale(1.04);}
  .img-overlay{
    position:absolute;bottom:0;left:0;right:0;
    background:linear-gradient(transparent,rgba(0,0,0,.55));
    padding:20px 16px 14px;
    font-size:.75rem;font-weight:600;letter-spacing:.5px;color:#fff;
  }

  .video-card{border-radius:22px;overflow:hidden;border:1px solid var(--line);box-shadow:0 16px 40px -20px rgba(17,24,39,.2);background:var(--surface);}
  .video-inner{position:relative;padding-bottom:56.25%;height:0;}
  .video-inner>div,.video-inner iframe{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important;border:none;}

  .back-btn{
    display:inline-flex;align-items:center;gap:10px;
    margin-top:56px;padding:14px 34px;
    font-size:.95rem;font-weight:600;color:var(--acc2);
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:100px;text-decoration:none;
    box-shadow:0 10px 26px -18px rgba(17,24,39,.18);
    transition:all .25s ease;
  }
  .back-btn:hover{border-color:var(--border2);color:var(--acc);transform:translateY(-3px);}
  .back-btn svg{width:18px;height:18px;fill:var(--acc2);transition:fill .25s ease;}

  .bottom-bar{position:fixed;bottom:0;left:0;right:0;height:3px;z-index:100;background:linear-gradient(90deg,transparent 0%,var(--acc2) 20%,var(--acc3) 50%,var(--acc2) 80%,transparent 100%);opacity:.35;}
  .center{text-align:center;}
</style>
</head>
<body>
<div class="bg">
  <div class="bg-mesh"></div>
</div>
<div class="wrap">
  <div class="hero">
    <div class="hero-badge"><span>📍 موقعیت مکانی</span></div>
    <h1>آدرس و <span>لوکیشن ما</span></h1>
    <p class="hero-sub">کافی‌نت طلوع سبزوار — پیدا کردن ما آسان است</p>
  </div>
  <div class="addr-card">
    <div class="addr-pin-row">
      <div class="pin-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
      </div>
      <div class="addr-text">
        <div class="addr-label">نشانی دقیق</div>
        <div class="addr-value">سبزوار؛ چهارراه استثنایی، نبش طالقانی ۱۹٫۱</div>
      </div>
    </div>
  </div>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-label">🗺️ مسیریابی</div>
    <div class="divider-line"></div>
  </div>
  <a rel="nofollow" href="https://www.google.com/maps/place/Tolue+Sabzevar+Internet+Cafe/@36.2196939,57.6766982,17z" target="_blank" class="map-btn">
    <div class="map-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
    </div>
    <div class="btn-text">
      <div class="btn-title">باز کردن در گوگل مپ</div>
      <div class="btn-hint">مسیریابی آنلاین — مستقیم از موبایل شما</div>
    </div>
    <div class="btn-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </div>
  </a>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-label">🖼️ تصاویر موقعیت</div>
    <div class="divider-line"></div>
  </div>
  <div class="img-grid">
    <div class="img-card">
      <img src="https://i.imgur.com/1f6D9J5.jpeg" loading="lazy" alt="نقشه موقعیت"/>
      <div class="img-overlay">▸ نقشه محله</div>
    </div>
    <div class="img-card">
      <img src="https://i.imgur.com/1B0ohQu.png" loading="lazy" alt="درب ورودی"/>
      <div class="img-overlay">▸ درب ورودی</div>
    </div>
  </div>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-label">🎬 ویدیوی مسیر</div>
    <div class="divider-line"></div>
  </div>
  <div class="video-card">
    <div class="video-inner">
      <div id="50427964749">
        <script type="text/JavaScript" src="https://www.aparat.com/embed/yjna084?data[rnddiv]=50427964749&data[responsive]=yes"></script>
      </div>
    </div>
  </div>
  <div class="center">
    <a class="back-btn" href="/"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>بازگشت به صفحه اصلی</a>
  </div>
</div>
<div class="bottom-bar"></div>
</body>
</html>
