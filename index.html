<style>
  :root{
    --ink:#14213D;
    --amber:#E8A33D;
    --amber-deep:#C9842A;
    --cream:#FAF7F2;
    --surface:#FFFFFF;
    --slate:#5C6470;
    --hairline:#ECE7DD;
    --teal:#2E8B7E;
    --violet:#8B3DFF;
    --turquoise:#17C3B2;
    --shadow-sm: 0 1px 2px rgba(20,33,61,0.04);
    --shadow-md: 0 6px 20px -8px rgba(20,33,61,0.18);
    --shadow-lg: 0 14px 34px -12px rgba(20,33,61,0.22);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
    background: var(--cream);
    background-image:
      radial-gradient(560px 320px at 50% -8%, rgba(232,163,61,0.18), transparent 70%),
      radial-gradient(420px 280px at 100% 0%, rgba(20,33,61,0.05), transparent 60%);
    background-repeat: no-repeat;
    color: var(--ink);
    direction: rtl;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* ---------- Ambient sparkle backdrop ---------- */
  .sparkle-field {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .sparkle-field .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
  }
  .sparkle-field .glow-1 { width: 320px; height: 320px; top: -120px; right: -80px; background: radial-gradient(circle, rgba(232,163,61,0.28), transparent 70%); }
  .sparkle-field .glow-2 { width: 260px; height: 260px; bottom: 10%; left: -100px; background: radial-gradient(circle, rgba(46,139,126,0.16), transparent 70%); }
  .sparkle-field .glow-3 { width: 220px; height: 220px; top: 38%; right: -60px; background: radial-gradient(circle, rgba(20,33,61,0.08), transparent 70%); }

  .spark {
    position: absolute;
    color: var(--amber);
    opacity: 0.55;
    animation: twinkle 3.4s ease-in-out infinite;
  }
  .spark svg { width: 100%; height: 100%; display: block; }
  .spark.s-sm { width: 9px; height: 9px; }
  .spark.s-md { width: 14px; height: 14px; }
  .spark.s-lg { width: 20px; height: 20px; }
  .spark.c-teal { color: var(--teal); }
  .spark.c-ink { color: var(--amber-deep); opacity: 0.4; }

  /* soft glow behind the star sparkles */
  .spark.star::before {
    content: "";
    position: absolute;
    inset: -60%;
    background: radial-gradient(circle, currentColor, transparent 70%);
    opacity: 0.35;
    border-radius: 50%;
    filter: blur(2px);
    z-index: -1;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.15; transform: scale(0.85) rotate(0deg); }
    50% { opacity: 0.75; transform: scale(1.05) rotate(8deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .spark { animation: none; opacity: 0.4; }
  }

  .page {
    max-width: 480px;
    margin: 0 auto;
    padding: 2.75rem 1.1rem 4rem;
    position: relative;
    z-index: 1;
  }

  /* ---------- Header / Identity ---------- */
  .identity { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 2.4rem; }

  .logo-ring {
    position: relative;
    width: 96px; height: 96px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.1rem;
  }
  .logo-ring::before {
    content: "";
    position: absolute; inset: 3px;
    border-radius: 50%;
    background: conic-gradient(from 200deg, var(--violet), var(--turquoise), var(--violet) 55%, var(--turquoise) 80%, var(--violet) 100%);
    opacity: 0.95;
    filter: blur(0.3px);
    animation: ring-rotate 6s linear infinite;
  }
  .logo-ring::after {
    content: "";
    position: absolute; inset: 3px;
    border-radius: 50%;
    box-shadow: 0 10px 26px -6px rgba(139,61,255,0.4), 0 10px 26px -6px rgba(23,195,178,0.35);
  }

  @keyframes ring-rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .logo-ring::before { animation: none; }
  }
  .logo-circle {
    position: relative;
    width: 84px; height: 84px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid var(--cream);
    background: var(--surface);
    z-index: 1;
  }
  .logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .brand-name {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: 0.2px;
    color: var(--ink);
  }
  .brand-tag {
    margin-top: 4px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--slate);
    letter-spacing: 0.2px;
  }

  /* ---------- Section labels ---------- */
  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--amber-deep);
    letter-spacing: 0.8px;
    margin: 2.1rem 0.2rem 0.7rem;
  }
  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(to left, var(--hairline), transparent);
  }
  .links-grid:first-of-type { margin-top: 0; }

  /* ---------- Link cards ---------- */
  .links-grid { display: flex; flex-direction: column; gap: 9px; }

  .link-card {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 16px;
    text-decoration: none;
    color: var(--ink);
    box-shadow: var(--shadow-sm);
    transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
  }
  .link-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
    border-color: #E2DACB;
  }
  .link-card:active { transform: translateY(0); box-shadow: var(--shadow-sm); }
  .link-card:focus-visible {
    outline: 2px solid var(--amber-deep);
    outline-offset: 2px;
  }

  .icon-wrap {
    width: 42px; height: 42px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  /* All icons fill the tile edge-to-edge, matching the Eitaa reference treatment */
  .icon-wrap svg, .icon-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .tg   { background: #E6F1FB; }
  .msg  { background: linear-gradient(135deg,#E6F1FB,#EDF6FF); }
  .ig   { background: linear-gradient(135deg,#F6E4ED,#FBEAF0); }
  .blog { background: #EEEDFE; }
  .info { background: #E1F5EE; }
  .gray { background: #F1EFE8; }
  .web  { background: #FAEEDA; }
  .srv  { background: #E0F5F5; }
  .ph   { background: linear-gradient(135deg,#E3F4E9,#EAF3DE); }

  .link-title { font-size: 14.5px; font-weight: 600; color: var(--ink); flex: 1; }
  .link-sub { font-size: 12px; color: var(--slate); margin-top: 2px; }

  .chevron { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .chevron svg { width: 16px; height: 16px; color: #C7C2B6; transition: transform 0.16s ease, color 0.16s ease; }
  .link-card:hover .chevron svg { transform: translateX(-2px); color: var(--amber-deep); }

  /* ---------- Footer ---------- */
  .footer-note {
    text-align: center;
    margin-top: 2.6rem;
    font-size: 11.5px;
    color: #A7A29A;
    letter-spacing: 0.2px;
  }

  @media (prefers-reduced-motion: reduce) {
    .link-card, .chevron svg { transition: none; }
  }
</style>
</head>
